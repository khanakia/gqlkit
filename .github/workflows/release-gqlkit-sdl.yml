name: Release gqlkit-sdl

on:
  push:
    tags:
      - "gqlkit-sdl@v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gqlkit-sdl/go.mod

      - name: Extract version and create local semver tag
        id: version
        run: |
          FULL_TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${FULL_TAG#gqlkit-sdl@}"
          git tag -f "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "full_tag=$FULL_TAG" >> "$GITHUB_OUTPUT"

      - name: Build with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --skip=publish
          workdir: gqlkit-sdl
        env:
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.full_tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$TAG" \
            --repo khanakia/gqlkit \
            --title "gqlkit-sdl $VERSION" \
            --generate-notes \
            gqlkit-sdl/dist/*.tar.gz gqlkit-sdl/dist/*.zip gqlkit-sdl/dist/gqlkit-sdl_checksums.txt
