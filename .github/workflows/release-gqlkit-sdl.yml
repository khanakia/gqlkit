name: Release gqlkit-sdl

on:
  push:
    tags:
      - "gqlkit-sdl/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gqlkit-sdl/go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
          workdir: gqlkit-sdl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
