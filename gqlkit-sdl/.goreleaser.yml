version: 2

project_name: gqlkit-sdl

builds:
  - id: gqlkit-sdl
    binary: gqlkit-sdl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: gqlkit-sdl
    builds:
      - gqlkit-sdl
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "gqlkit-sdl_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: khanakia
    name: gqlkit
  name_template: "gqlkit-sdl {{ .Version }}"
