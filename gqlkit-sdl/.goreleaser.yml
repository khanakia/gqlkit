version: 2

project_name: gqlkit-sdl

git:
  tag_sort: -version:refname
  prerelease_suffix: "-"
  ignore_tags:
    - "gqlkit/v*"

monorepo:
  tag_prefix: gqlkit-sdl/

builds:
  - id: gqlkit-sdl
    binary: gqlkit-sdl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: gqlkit-sdl
    builds:
      - gqlkit-sdl
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: khanakia
    name: gqlkit
